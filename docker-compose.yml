services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://backend-production-xxxx.up.railway.app # Railway vai gerar essa URL
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - laudo_data:/app/laudos
    environment:
      - DATABASE_URL=postgresql://konig:sertao123@db:5432/laudo_db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=konig
      - POSTGRES_PASSWORD=sertao123
      - POSTGRES_DB=laudo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  laudo_data:
